<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Guess the Country</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
  <script src="https://unpkg.com/globe.gl"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
</head>
<body>
  <div id="globe-container"></div>

  <div id="hud-layer" aria-live="polite">
    <div class="hud-topbar glass">
      <div class="hud-item">
        <span class="hud-label">Region</span>
        <span id="mode-label" class="hud-value"><span id="mode">World</span></span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Mode</span>
        <span id="learning-mode-label" class="hud-value">Normal</span>
      </div>
      <div class="hud-item hud-find">
        <span class="hud-label">Find</span>
        <span id="target" class="hud-value">Loading...</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Score</span>
        <span id="score" class="hud-value">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Timer</span>
        <span id="timer" class="hud-value">00:00</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Streak</span>
        <span id="streak" class="hud-value">0</span>
      </div>
    </div>

    <div id="hud-toast" class="hud-toast" role="status" aria-live="polite"></div>

    <aside class="hud-panel glass" aria-label="Game controls">
      <button id="next" class="hud-btn" aria-label="Next country" title="Next">Next &rarr;</button>
      <button id="reset" class="hud-btn" aria-label="Reset game" title="Reset">&#8635; Reset</button>
      <button id="play-again" class="hud-btn hidden" aria-label="Play again" title="Play Again">&#9654; Play</button>

      <div class="hud-divider"></div>

      <div class="hud-panel-section">
        <div class="panel-title">Quiz Mode</div>
        <div id="mode-select" class="mode-select" aria-label="Quiz region">
          <button id="mode-select-button" class="mode-select__button" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span class="mode-select__icon" aria-hidden="true">&#127760;</span>
            <span id="mode-select-label" class="mode-select__label">Loading...</span>
            <span class="mode-select__chevron" aria-hidden="true">v</span>
          </button>
          <ul id="mode-select-list" class="mode-select__list" role="listbox" aria-label="Quiz region options"></ul>
        </div>
      </div>

      <div class="hud-panel-section">
        <div class="panel-title">Learning Mode</div>
        <div class="mode-toggle" role="group" aria-label="Learning mode">
          <button id="mode-normal" class="mode-btn is-active" type="button">Normal</button>
          <button id="mode-learning" class="mode-btn" type="button">Learning</button>
          <button id="mode-review" class="mode-btn" type="button">Review</button>
        </div>
      </div>

      <div class="hud-panel-section">
        <div class="panel-title">Learning Stats</div>
        <div class="stat-row">
          <span class="hud-label">Hard</span>
          <span id="hard-count" class="hud-value">0</span>
        </div>
        <div class="stat-row">
          <span class="hud-label">Medium</span>
          <span id="medium-count" class="hud-value">0</span>
        </div>
        <div class="stat-row">
          <span class="hud-label">Mastered</span>
          <span id="mastered-count" class="hud-value">0</span>
        </div>
        <div class="stat-row">
          <span class="hud-label">Accuracy</span>
          <span id="accuracy-rate" class="hud-value">0%</span>
        </div>
      </div>

      <div class="hud-panel-section">
        <div class="panel-title">Quiz Stats</div>
        <div class="stat-row">
          <span class="hud-label">Progress</span>
          <span id="progress" class="hud-value">0/0</span>
        </div>
        <div class="stat-row">
          <span class="hud-label">Strikes</span>
          <span id="wrong-indicator" class="hud-value">&#9675;&#9675;&#9675;</span>
        </div>
      </div>
    </aside>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
